<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M.CQ Outreach Dashboard</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#f0f0f0;padding:16px;font-size:13px;line-height:1.5}
    .header{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid #2a2a2a}
    .badge{background:#E8622A;color:white;font-weight:700;font-size:11px;padding:4px 10px;border-radius:4px}
    .header h1{font-size:14px;font-weight:700}
    .header p{font-size:11px;color:#888}
    .prospect{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:12px 14px;margin-bottom:14px}
    .label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#E8622A;margin-bottom:4px}
    .name{font-size:16px;font-weight:700}
    .meta{font-size:12px;color:#aaa;margin-top:2px}
    .tabs{display:flex;gap:6px;margin-bottom:12px}
    .tab{flex:1;text-align:center;padding:7px 0;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #2a2a2a;background:#1a1a1a;color:#888}
    .tab.active{background:#E8622A;color:white;border-color:#E8622A}
    .panel{display:none;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:14px}
    .panel.active{display:block}
    .fl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#E8622A;margin-bottom:5px;margin-top:12px}
    .fl:first-child{margin-top:0}
    .fc{background:#111;border:1px solid #333;border-radius:6px;padding:10px 12px;font-size:12px;color:#ddd;white-space:pre-wrap;line-height:1.6}
    .btn{display:block;width:100%;margin-top:14px;padding:10px;background:#E8622A;color:white;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
    .btn.ok{background:#2a7a2a}
    .footer{margin-top:16px;text-align:center;font-size:10px;color:#444}
  </style>
</head>
<body>
  <div class="header">
    <div class="badge">M.CQ</div>
    <div><h1>Lead Outreach Package</h1><p>M.CQ Ventures — AI Governance Consulting</p></div>
  </div>
  <div class="prospect">
    <div class="label">Target Prospect</div>
    <div class="name" id="pname">—</div>
    <div class="meta" id="pmeta">—</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="sw('email',this)">Email</div>
    <div class="tab" onclick="sw('linkedin',this)">LinkedIn</div>
  </div>
  <div id="email-panel" class="panel active">
    <div class="fl">Subject Line</div><div class="fc" id="subj">—</div>
    <div class="fl">Message Body</div><div class="fc" id="ebody">—</div>
    <button class="btn" onclick="cp('ebody',this,'Copy Email Body')">Copy Email Body</button>
  </div>
  <div id="linkedin-panel" class="panel">
    <div class="fl">LinkedIn Message</div><div class="fc" id="lmsg">—</div>
    <button class="btn" onclick="cp('lmsg',this,'Copy LinkedIn Message')">Copy LinkedIn Message</button>
  </div>
  <div class="footer">M.CQ Ventures Outreach Engine · mcqventures.com</div>
  <script>
    const p=new URLSearchParams(location.search);
    document.getElementById('pname').textContent=decodeURIComponent(p.get('name')||'—');
    document.getElementById('pmeta').textContent=decodeURIComponent(p.get('title')||'—')+' · '+decodeURIComponent(p.get('company')||'—');
    document.getElementById('subj').textContent=decodeURIComponent(p.get('subject')||'—');
    document.getElementById('ebody').textContent=decodeURIComponent(p.get('email')||'—');
    document.getElementById('lmsg').textContent=decodeURIComponent(p.get('linkedin')||'—');
    function sw(t,el){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));el.classList.add('active');document.getElementById(t+'-panel').classList.add('active');}
    function cp(id,btn,label){navigator.clipboard.writeText(document.getElementById(id).textContent).then(()=>{btn.textContent='Copied!';btn.classList.add('ok');setTimeout(()=>{btn.textContent=label;btn.classList.remove('ok');},2000);});}
  </script>
</body>
</html>
